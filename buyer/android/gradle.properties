# Reduced memory + TieredStopAtLevel workaround for JVM crash on Apple Silicon (arm64)
# Original bug: "Field too big for insn" in C1 CompilerThread
# If build still crashes, try: arch -x86_64 flutter build apk ...
org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=1g -XX:ReservedCodeCacheSize=256m -XX:+HeapDumpOnOutOfMemoryError -XX:TieredStopAtLevel=1
android.useAndroidX=true
android.enableJetifier=true
# This builtInKotlin flag was added automatically by Flutter migrator
android.builtInKotlin=false
# This newDsl flag was added automatically by Flutter migrator
android.newDsl=false
